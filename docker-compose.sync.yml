services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${CHACHING_POSTGRES_DB:-chaching}
      POSTGRES_USER: ${CHACHING_POSTGRES_USER:-chaching}
      POSTGRES_PASSWORD: ${CHACHING_POSTGRES_PASSWORD:?set CHACHING_POSTGRES_PASSWORD}
    ports:
      # Keep this private. For a Tailscale pool, set CHACHING_POSTGRES_BIND to
      # this machine's Tailscale IPv4 address, never 0.0.0.0 on an untrusted network.
      - "${CHACHING_POSTGRES_BIND:-127.0.0.1}:${CHACHING_POSTGRES_PORT:-5432}:5432"
    volumes:
      - chaching-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  chaching-postgres:
